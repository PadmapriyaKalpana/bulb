<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
        }
        div{
            text-align: center;
            justify-content: center;
            align-items: center;
            margin-top: 50px;
            padding: 20px;
        }
        button{
            padding: 3px;
        }
    </style>
</head>
<body>
    <div>
    <button onclick="turnon()">Turn on the Light</button>
    <img id="image" src="pic_bulboff.gif">
    <button onclick="turnoff()">Turn off the Light</button>
    </div>
    <script>
        function turnon(){
        document.getElementById('image').src='pic_bulbon_on.gif'
        }
        function turnoff(){
        document.getElementById('image').src='pic_bulboff.gif'
        }
    </script>
</body>
</html>
